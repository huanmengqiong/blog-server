<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客 - 发现精彩文章</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 搜索框 */
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 0 16px;
            transition: border-color 0.3s;
        }
        .search-box:focus-within {
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52,152,219,0.1);
        }
        .search-box input {
            border: none;
            outline: none;
            padding: 10px 0;
            font-size: 14px;
            flex: 1;
            background: transparent;
            min-width: 160px;
        }
        .search-box button {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #2980b9;
        }

        /* 标签云 */
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tag-cloud .tag-item {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #e0e0e0;
            background: #fff;
            color: #555;
        }
        .tag-cloud .tag-item:hover {
            border-color: #3498db;
            color: #3498db;
            transform: translateY(-2px);
        }
        .tag-cloud .tag-item.active {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
        }

        /* 骨架屏 */
        .skeleton-card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        .skeleton-title {
            height: 24px;
            width: 60%;
            margin-bottom: 12px;
        }
        .skeleton-text {
            height: 14px;
            width: 90%;
            margin-bottom: 8px;
        }
        .skeleton-text.short {
            width: 70%;
        }
        .skeleton-meta {
            height: 12px;
            width: 40%;
            margin-top: 16px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #3498db;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(52,152,219,0.4);
            display: none;
            transition: all 0.3s;
            z-index: 99;
        }
        .back-to-top:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(52,152,219,0.5);
        }
        .back-to-top.show {
            display: block;
        }

        /* 搜索高亮 */
        .highlight {
            background: #fff3cd;
            padding: 0 2px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1>📝 发现精彩文章</h1>
            <p>探索技术前沿，分享知识见解</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <div class="stat-number" id="articleCount">-</div>
                <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📁</div>
                <div class="stat-number" id="categoryCount">-</div>
                <div class="stat-label">文章分类</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏷️</div>
                <div class="stat-number" id="tagCount">-</div>
                <div class="stat-label">技术标签</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-number" id="userCount">-</div>
                <div class="stat-label">注册用户</div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="keywordInput" placeholder="搜索文章标题...">
                <button onclick="doSearch()">搜索</button>
                <button onclick="clearSearch()" style="background:#e0e0e0;color:#555;">✕</button>
            </div>
            <label>分类：</label>
            <select id="categoryFilter">
                <option value="">📂 全部分类</option>
            </select>
            <label>标签：</label>
            <select id="tagFilter">
                <option value="">🏷️ 全部标签</option>
            </select>
            <label>每页：</label>
            <select id="limitSelect">
                <option value="5">5 条</option>
                <option value="10" selected>10 条</option>
                <option value="20">20 条</option>
            </select>
        </div>

        <!-- 热门标签 -->
        <div class="tag-cloud" id="tagCloud"></div>

        <!-- 结果信息 -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <span style="color:#95a5a6;font-size:14px;" id="resultInfo"></span>
            <span style="color:#bbb;font-size:12px;" id="searchKeyword"></span>
        </div>

        <!-- 文章列表 -->
        <div class="article-list" id="articleList">
            <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-meta"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-meta"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-meta"></div></div>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

    <!-- 页脚 -->
    <div class="footer">
        <p>© 2026 我的博客 | 用 ❤️ 和 Node.js 构建</p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let currentPage = 1;
        let currentLimit = 10;
        let currentCategoryId = '';
        let currentTagId = '';
        let currentKeyword = '';
        let allTagsData = [];

        async function init() {
            renderNavbar();
            await loadStats();
            await loadFilters();
            await loadTagCloud();
            await loadArticles();
            bindEvents();
        }

        // 加载统计数据
        async function loadStats() {
            const catRes = await CategoryAPI.getAll();
            if (catRes.success) {
                document.getElementById('categoryCount').textContent = catRes.data.length;
            }

            const tagRes = await TagAPI.getAll();
            if (tagRes.success) {
                document.getElementById('tagCount').textContent = tagRes.data.length;
                allTagsData = tagRes.data;
            }

            const articleRes = await ArticleAPI.getList({ page: 1, limit: 1 });
            if (articleRes.success) {
                document.getElementById('articleCount').textContent = articleRes.data.pagination.total;
            }

            document.getElementById('userCount').textContent = '5+';
        }

        // 加载筛选选项
        async function loadFilters() {
            const catRes = await CategoryAPI.getAll();
            if (catRes.success) {
                const select = document.getElementById('categoryFilter');
                catRes.data.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = `📁 ${cat.name} (${cat.articleCount})`;
                    select.appendChild(option);
                });
            }

            const tagRes = await TagAPI.getAll();
            if (tagRes.success) {
                const select = document.getElementById('tagFilter');
                tagRes.data.forEach(tag => {
                    const option = document.createElement('option');
                    option.value = tag.id;
                    option.textContent = `🏷️ ${tag.name} (${tag.articleCount})`;
                    select.appendChild(option);
                });
            }
        }

        // 加载热门标签云
        async function loadTagCloud() {
            const container = document.getElementById('tagCloud');
            const tags = allTagsData.filter(t => t.articleCount > 0).slice(0, 8);
            
            container.innerHTML = tags.map(tag => `
                <span class="tag-item ${currentTagId == tag.id ? 'active' : ''}" 
                      onclick="selectCloudTag(${tag.id})" 
                      data-id="${tag.id}">
                    ${tag.name}
                    <span style="font-size:11px;opacity:0.7;">(${tag.articleCount})</span>
                </span>
            `).join('');
        }

        function selectCloudTag(tagId) {
            if (currentTagId == tagId) {
                currentTagId = '';
                document.getElementById('tagFilter').value = '';
            } else {
                currentTagId = tagId;
                document.getElementById('tagFilter').value = tagId;
            }
            currentPage = 1;
            loadArticles();
            loadTagCloud();
        }

        // 加载文章列表
        async function loadArticles() {
            document.getElementById('articleList').innerHTML = `
                <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-meta"></div></div>
                <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-meta"></div></div>
                <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div><div class="skeleton skeleton-meta"></div></div>
            `;

            const params = { page: currentPage, limit: currentLimit };
            if (currentCategoryId) params.categoryId = currentCategoryId;
            if (currentTagId) params.tagId = currentTagId;
            if (currentKeyword) params.keyword = currentKeyword;

            const res = await ArticleAPI.getList(params);

            if (res.success) {
                renderArticles(res.data.list);
                renderPagination(res.data.pagination);
                const searchInfo = currentKeyword ? `搜索"${currentKeyword}"的结果，` : '';
                document.getElementById('resultInfo').textContent = 
                    `${searchInfo}共 ${res.data.pagination.total} 篇文章，第 ${currentPage}/${Math.max(1, res.data.pagination.totalPages)} 页`;
                document.getElementById('searchKeyword').textContent = currentKeyword ? `关键词: ${currentKeyword}` : '';
            } else {
                document.getElementById('articleList').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😕</div>
                        <p>加载失败</p>
                        <p class="sub">${res.message}</p>
                    </div>`;
            }
        }

        // 渲染文章列表
        function renderArticles(list) {
            const container = document.getElementById('articleList');

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>暂无文章</p>
                        <p class="sub">${currentKeyword ? `没有找到包含"${currentKeyword}"的文章` : '换个筛选条件试试，或者去写一篇文章吧'}</p>
                        ${currentKeyword ? '<p class="sub"><a href="javascript:void(0)" onclick="clearSearch()">清除搜索</a></p>' : ''}
                    </div>`;
                return;
            }

            container.innerHTML = list.map(article => `
                <div class="article-card" onclick="goDetail(${article.id})">
                    <h2>${highlightText(escapeHtml(article.title), currentKeyword)}</h2>
                    <p class="summary">${highlightText(escapeHtml(article.summary || '暂无摘要'), currentKeyword)}</p>
                    <div class="meta">
                        <span>👤 ${escapeHtml(article.author.username)}</span>
                        <span>📁 ${article.category ? escapeHtml(article.category.name) : '未分类'}</span>
                        <span>📅 ${formatTime(article.createdAt)}</span>
                        <span>👁 ${article.viewCount} 阅读</span>
                        ${article.tags && article.tags.length > 0 ? `
                        <span>
                            ${article.tags.map(tag => `<span class="tag">${escapeHtml(tag.name)}</span>`).join(' ')}
                        </span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 高亮搜索关键词
        function highlightText(text, keyword) {
            if (!keyword || !text) return text;
            const regex = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 渲染分页
        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            const { totalPages, page } = pagination;

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button ${page <= 1 ? 'disabled' : ''} onclick="goPage(${page - 1})">◀ 上一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="${i === page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += '<span>···</span>';
                }
            }

            html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="goPage(${page + 1})">下一页 ▶</button>`;

            container.innerHTML = html;
        }

        function goPage(page) {
            currentPage = page;
            loadArticles();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        function goDetail(id) {
            window.location.href = `detail.html?id=${id}`;
        }

        function doSearch() {
            currentKeyword = document.getElementById('keywordInput').value.trim();
            currentPage = 1;
            loadArticles();
        }

        function clearSearch() {
            currentKeyword = '';
            document.getElementById('keywordInput').value = '';
            currentPage = 1;
            loadArticles();
        }

        function bindEvents() {
            document.getElementById('categoryFilter').addEventListener('change', function() {
                currentCategoryId = this.value;
                currentPage = 1;
                loadArticles();
            });

            document.getElementById('tagFilter').addEventListener('change', function() {
                currentTagId = this.value;
                currentPage = 1;
                loadArticles();
                loadTagCloud();
            });

            document.getElementById('limitSelect').addEventListener('change', function() {
                currentLimit = parseInt(this.value);
                currentPage = 1;
                loadArticles();
            });

            // 回车搜索
            document.getElementById('keywordInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') doSearch();
            });

            // 回到顶部按钮
            window.addEventListener('scroll', function() {
                const btn = document.getElementById('backToTop');
                if (window.scrollY > 500) {
                    btn.classList.add('show');
                } else {
                    btn.classList.remove('show');
                }
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
